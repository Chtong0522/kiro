<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOL Meme Hunter v6.0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 12px; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #16213e; border: 1px solid #0f3460; border-radius: 8px; margin-bottom: 12px; }
.header h1 { font-size: 1.2rem; color: #00d4ff; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
.status-dot.active { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
.status-dot.paused { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }
.status-dot.stopped { background: #ff4444; box-shadow: 0 0 6px #ff4444; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
.card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px; text-align: center; }
.card .label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
.card .value { font-size: 1.3rem; font-weight: bold; color: #00d4ff; }
.card .value.positive { color: #00ff88; }
.card .value.negative { color: #ff4444; }
.section { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.section h2 { font-size: 0.85rem; color: #00d4ff; margin-bottom: 8px; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
th { color: #888; text-align: left; padding: 4px 6px; border-bottom: 1px solid #0f3460; }
td { padding: 4px 6px; border-bottom: 1px solid #0f3460; }
tr:hover { background: rgba(0, 212, 255, 0.05); }
.pnl-pos { color: #00ff88; }
.pnl-neg { color: #ff4444; }
.tier-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 0.65rem; font-weight: bold; }
.tier-A { background: #1a4d1a; color: #00ff88; }
.tier-B { background: #4d4d1a; color: #ffdd00; }
.tier-D { background: #1a1a4d; color: #88aaff; }
.feed { max-height: 200px; overflow-y: auto; font-size: 0.7rem; line-height: 1.5; }
.feed-line { padding: 2px 0; border-bottom: 1px solid #0a0a1a; }
.feed-time { color: #666; margin-right: 6px; }
.risk-row { display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.8rem; }
.risk-item { display: flex; align-items: center; gap: 4px; }
.risk-label { color: #888; }
.risk-val { font-weight: bold; }
.risk-normal { color: #00ff88; }
.risk-warning { color: #ffaa00; }
.risk-danger { color: #ff4444; }
.updated { font-size: 0.65rem; color: #555; }
@media (max-width: 600px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
  .header h1 { font-size: 1rem; }
  table { font-size: 0.65rem; }
}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;">
    <span class="status-dot active" id="statusDot"></span>
    <h1>SOL Meme Hunter v6.0</h1>
  </div>
  <span class="updated" id="updatedAt">--</span>
</div>

<div class="cards">
  <div class="card"><div class="label">Balance</div><div class="value" id="balance">--</div></div>
  <div class="card"><div class="label">Daily PnL</div><div class="value" id="dailyPnl">--</div></div>
  <div class="card"><div class="label">Win Rate</div><div class="value" id="winRate">--</div></div>
  <div class="card"><div class="label">Positions</div><div class="value" id="posCount">--</div></div>
</div>

<div class="section">
  <h2>Active Positions</h2>
  <div style="overflow-x:auto;">
    <table>
      <thead><tr><th>Symbol</th><th>Tier</th><th>Entry</th><th>Current</th><th>PnL%</th><th>Age</th><th>Status</th></tr></thead>
      <tbody id="posTable"></tbody>
    </table>
  </div>
</div>

<div class="section">
  <h2>Trade History (Last 20)</h2>
  <div style="overflow-x:auto;">
    <table>
      <thead><tr><th>Time</th><th>Symbol</th><th>Tier</th><th>Action</th><th>PnL</th></tr></thead>
      <tbody id="tradeTable"></tbody>
    </table>
  </div>
</div>

<div class="section">
  <h2>Session Risk</h2>
  <div class="risk-row" id="riskRow">
    <div class="risk-item"><span class="risk-label">Status:</span><span class="risk-val risk-normal" id="riskStatus">Normal</span></div>
    <div class="risk-item"><span class="risk-label">Consec Losses:</span><span class="risk-val" id="riskLosses">0</span></div>
    <div class="risk-item"><span class="risk-label">Daily Loss:</span><span class="risk-val" id="riskDaily">$0.00</span></div>
  </div>
</div>

<div class="section">
  <h2>Activity Feed</h2>
  <div class="feed" id="feedBox"></div>
</div>

<script>
function tierBadge(t) {
  var c = 'tier-' + (t || 'D');
  return '<span class="tier-badge ' + c + '">' + (t || '?') + '</span>';
}
function pnlClass(v) { return v >= 0 ? 'pnl-pos' : 'pnl-neg'; }
function fmt(v) { return v != null ? '$' + Number(v).toFixed(2) : '--'; }
function pctFmt(v) { return v != null ? (v >= 0 ? '+' : '') + Number(v).toFixed(1) + '%' : '--'; }
function ageFmt(sec) {
  if (sec == null) return '--';
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm';
  return Math.floor(sec/3600) + 'h ' + Math.floor((sec%3600)/60) + 'm';
}
function timeFmt(ts) {
  if (!ts) return '--';
  var d = new Date(ts * 1000);
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function update() {
  fetch('/api/state').then(function(r){ return r.json(); }).then(function(data){
    // Status
    var dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + (data.paused ? 'paused' : data.stopped ? 'stopped' : 'active');
    document.getElementById('updatedAt', 'Updated: ' + new Date().toLocaleTimeString());

    // Cards
    document.getElementById('balance').textContent = fmt(data.balance);
    var pnl = data.daily_pnl || 0;
    var pnlEl = document.getElementById('dailyPnl');
    pnlEl.textContent = (pnl >= 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(2);
    pnlEl.className = 'value ' + (pnl >= 0 ? 'positive' : 'negative');
    document.getElementById('winRate').textContent = data.win_rate != null ? data.win_rate + '%' : '--';
    document.getElementById('posCount').textContent = data.positions ? data.positions.length : 0;

    // Positions
    var tbody = document.getElementById('posTable');
    tbody.innerHTML = '';
    (data.positions || []).forEach(function(p){
      var pnlPct = p.pnl_pct != null ? p.pnl_pct : 0;
      tbody.innerHTML += '<tr><td>' + (p.symbol||p.address||'--').substring(0,8) + '</td><td>' + tierBadge(p.tier) + '</td><td>' + fmt(p.entry_price) + '</td><td>' + fmt(p.current_price) + '</td><td class="' + pnlClass(pnlPct) + '">' + pctFmt(pnlPct) + '</td><td>' + ageFmt(p.age_sec) + '</td><td>' + (p.status||'open') + '</td></tr>';
    });

    // Trades
    var ttbody = document.getElementById('tradeTable');
    ttbody.innerHTML = '';
    (data.trades || []).slice(0, 20).forEach(function(t){
      var pnlVal = t.pnl || 0;
      ttbody.innerHTML += '<tr><td>' + timeFmt(t.ts) + '</td><td>' + (t.symbol||'--').substring(0,8) + '</td><td>' + tierBadge(t.tier) + '</td><td>' + (t.action||'--') + '</td><td class="' + pnlClass(pnlVal) + '">' + fmt(pnlVal) + '</td></tr>';
    });

    // Risk
    var rs = data.risk || {};
    var statusEl = document.getElementById('riskStatus');
    statusEl.textContent = rs.status || 'Normal';
    statusEl.className = 'risk-val ' + (rs.status === 'stopped' ? 'risk-danger' : rs.status === 'paused' ? 'risk-warning' : 'risk-normal');
    document.getElementById('riskLosses').textContent = rs.consec_losses || 0;
    document.getElementById('riskDaily').textContent = fmt(rs.daily_loss);

    // Feed
    var feedBox = document.getElementById('feedBox');
    feedBox.innerHTML = '';
    (data.feed || []).slice(0, 30).forEach(function(line){
      feedBox.innerHTML += '<div class="feed-line"><span class="feed-time">' + (line.time||'') + '</span>' + (line.msg||line) + '</div>';
    });

    document.getElementById('updatedAt').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  }).catch(function(e){
    document.getElementById('statusDot').className = 'status-dot stopped';
    document.getElementById('updatedAt').textContent = 'Connection lost';
  });
}

update();
setInterval(update, 2000);
</script>
</body>
</html>
